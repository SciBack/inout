services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-inout}
      POSTGRES_USER: ${POSTGRES_USER:-inout}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-inout}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-inout}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-inout}
      KOHA_API_URL: ${KOHA_API_URL}
      KOHA_API_USER: ${KOHA_API_USER}
      KOHA_API_PASS: ${KOHA_API_PASS}
      KOHA_VERIFY_SSL: ${KOHA_VERIFY_SSL:-false}
      DEFAULT_SPACE_ID: ${DEFAULT_SPACE_ID:-1}
      DEFAULT_SPACE_CAPACITY: ${DEFAULT_SPACE_CAPACITY:-150}
      DEFAULT_SPACE_NAME: ${DEFAULT_SPACE_NAME:-Biblioteca}
      SECRET_KEY: ${SECRET_KEY}
      KOHA_DB_HOST: ${KOHA_DB_HOST:-}
      KOHA_DB_USER: ${KOHA_DB_USER:-}
      KOHA_DB_PASS: ${KOHA_DB_PASS:-}
      KOHA_DB_NAME: ${KOHA_DB_NAME:-}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8090:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
